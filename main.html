<!DOCTYPE html>
<html>
	<head>
		<title>Pekario</title>
        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js"></script>
        <!-- MIDI playback library -->
        <script src="https://www.midijs.net/lib/midi.js"></script>
        <script>
            // Fallback object so button clicks never throw if auth script fails to load.
            window.PekarioAuth = window.PekarioAuth || {
                loginWithHive: function () {
                    var errDiv = document.getElementById("pekario-login-error");
                    if (errDiv) {
                        errDiv.style.display = "block";
                        errDiv.innerHTML = "Login module not loaded. Refresh the page and try again.";
                    }
                },
                loginWithMetaMask: function () {
                    var errDiv = document.getElementById("pekario-login-error");
                    if (errDiv) {
                        errDiv.style.display = "block";
                        errDiv.innerHTML = "Login module not loaded. Refresh the page and try again.";
                    }
                },
                skipLogin: function () {
                    // Skip immediately
                    var overlay = document.getElementById("pekario-login-overlay");
                    if (overlay) {
                        overlay.style.transition = "opacity 0.6s ease";
                        overlay.style.opacity = "0";
                        setTimeout(function() {
                            overlay.style.display = "none";
                            var canvas = document.getElementById("canvas");
                            if (canvas) canvas.style.display = "block";
                            if (!window.Enjine || !window.Mario || !window.Mario.LoadingState) {
                                var errDiv = document.getElementById("pekario-login-error");
                                if (errDiv) {
                                    errDiv.style.display = "block";
                                    errDiv.innerHTML = "Game files failed to load (host timeout/522). Refresh and try again.";
                                }
                                return;
                            }
                            new Enjine.Application().Initialize(new Mario.LoadingState(), 320, 240);
                        }, 650);
                    }
                }
            };
        </script>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                background: #111;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: 'Press Start 2P', monospace, sans-serif;
            }

            canvas {
                width: 960px !important;
                height: 720px !important;
                max-width: 100vw;
                max-height: 80vh;
                display: block;
                margin: 0 auto;
                image-rendering: pixelated;
                border: 4px solid #e52;
            }

            /* ── Login Overlay ── */
            #pekario-login-overlay {
                position: fixed;
                inset: 0;
                background: linear-gradient(160deg, #0d0d1a 0%, #1a0a2e 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 999;
                gap: 24px;
            }

            #pekario-login-overlay h1 {
                color: #f8c53a;
                font-size: 2.4rem;
                text-shadow: 0 0 20px #f8c53a88;
                letter-spacing: 4px;
            }

            #pekario-login-overlay p.subtitle {
                color: #aaa;
                font-size: 0.75rem;
                letter-spacing: 2px;
            }

            .login-btn {
                width: 300px;
                padding: 14px 20px;
                border: none;
                border-radius: 6px;
                font-size: 0.9rem;
                font-weight: bold;
                cursor: pointer;
                letter-spacing: 1px;
                transition: transform 0.1s, filter 0.2s;
            }
            .login-btn:hover { filter: brightness(1.2); transform: scale(1.04); }
            .login-btn:active { transform: scale(0.97); }

            #btn-hive {
                background: #e63946;
                color: #fff;
            }

            #btn-metamask {
                background: #f6851b;
                color: #fff;
            }

            #pekario-login-error {
                display: none;
                color: #ff6b6b;
                font-size: 0.72rem;
                text-align: center;
                max-width: 320px;
                line-height: 1.8;
            }
            #pekario-login-error a { color: #f8c53a; }

            #pekario-user-label {
                color: #4ade80;
                font-size: 0.7rem;
                letter-spacing: 1px;
            }

            .divider {
                color: #444;
                font-size: 0.7rem;
                letter-spacing: 3px;
            }

            /* ── Touch Controls (Mobile Only) ── */
            #touch-controls {
                display: none;
                position: fixed;
                bottom: 24px;
                left: 0; right: 0;
                width: 100vw;
                justify-content: space-between;
                align-items: flex-end;
                z-index: 1000;
                pointer-events: none;
                padding: 0 24px;
            }
            .touch-dpad {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                pointer-events: auto;
            }
            .touch-dpad > div {
                display: flex;
                gap: 6px;
            }
            .touch-ab {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                pointer-events: auto;
            }
            .touch-start-select {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                pointer-events: auto;
            }
            .touch-btn {
                pointer-events: auto;
                width: 56px; height: 56px;
                border-radius: 50%;
                border: none;
                background: #222c;
                color: #fff;
                font-size: 2rem;
                font-family: inherit;
                box-shadow: 0 2px 8px #0008;
                margin: 0 4px;
                outline: none;
                user-select: none;
                touch-action: none;
            }
            .touch-btn.small {
                width: 48px; height: 32px;
                border-radius: 12px;
                font-size: 1rem;
            }
            .touch-btn:active {
                background: #f8c53a;
                color: #222;
            }
            @media (max-width: 900px) {
                #touch-controls { display: flex; }
            }

            /* ── Touch Controls (Nintendo Layout, Mobile Only) ── */
            .touch-dpad {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            .touch-dpad div {
                display: flex;
                gap: 4px;
            }
            .touch-ab {
                display: flex;
                gap: 4px;
            }
            .touch-start-select {
                display: flex;
                gap: 4px;
            }
            .touch-btn.small {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
        </style>
	</head>
	<body>

        <!-- ── Login Screen ── -->
        <div id="pekario-login-overlay">
            <h1>PEKARIO</h1>
            <p class="subtitle">Sign in to play</p>

            <button class="login-btn" id="btn-hive" onclick="window.PekarioAuth.loginWithHive()">
                🐝 Login with Hive Keychain
            </button>

            <span class="divider">── or ──</span>

            <button class="login-btn" id="btn-metamask" onclick="window.PekarioAuth.loginWithMetaMask()">
                🦊 Login with MetaMask
            </button>

            <span class="divider">── or ──</span>

            <button class="login-btn" id="btn-skip" onclick="window.PekarioAuth.skipLogin()" style="background: #666; width: 200px;">
                Skip Login
            </button>

            <div id="pekario-login-error"></div>
            <div id="pekario-user-label"></div>
        </div>

		<canvas id="canvas" width="640" height="480">
			<p>Your browser does not support the canvas element.</p>
		</canvas>

        <!-- ── Touch Controls (Nintendo Layout, Mobile Only) ── -->
        <div id="touch-controls">
            <div class="touch-dpad">
                <button class="touch-btn" id="btn-up">&#8593;</button>
                <div>
                    <button class="touch-btn" id="btn-left">&#8592;</button>
                    <button class="touch-btn" id="btn-down">&#8595;</button>
                    <button class="touch-btn" id="btn-right">&#8594;</button>
                </div>
            </div>
            <div class="touch-ab">
                <button class="touch-btn" id="btn-b">B</button>
                <button class="touch-btn" id="btn-a">A</button>
            </div>
            <div class="touch-start-select">
                <button class="touch-btn small" id="btn-select">Select</button>
                <button class="touch-btn small" id="btn-start">Start</button>
            </div>
        </div>

        <!-- Enjine Includes -->
        <script src="Enjine/core.js"></script>
        <script src="Enjine/gameCanvas.js"></script>
        <script src="Enjine/keyboardInput.js"></script>
        <script src="Enjine/resources.js"></script>
        <script src="Enjine/drawable.js"></script>
        <script src="Enjine/state.js"></script>
        <script src="Enjine/gameTimer.js"></script>
        <script src="Enjine/camera.js"></script>
        <script src="Enjine/drawableManager.js"></script>
        <script src="Enjine/sprite.js"></script>
        <script src="Enjine/spriteFont.js"></script>
        <script src="Enjine/frameSprite.js"></script>
        <script src="Enjine/animatedSprite.js"></script>
        <script src="Enjine/collideable.js"></script>
        <script src="Enjine/application.js"></script>

        <!-- Actual game code -->
        <script src="code/setup.js"></script>
        <script src="code/spriteCuts.js"></script>
        <script src="code/level.js"></script>
        <script src="code/backgroundGenerator.js"></script>
        <script src="code/backgroundRenderer.js"></script>
        <script src="code/improvedNoise.js"></script>
        <script src="code/notchSprite.js"></script>
        <script src="code/character.js"></script>
        <script src="code/levelRenderer.js"></script>
        <script src="code/levelGenerator.js"></script>
        <script src="code/spriteTemplate.js"></script>
        <script src="code/enemy.js"></script>
        <script src="code/fireball.js"></script>
        <script src="code/sparkle.js"></script>
        <script src="code/coinAnim.js"></script>
        <script src="code/mushroom.js"></script>
		<script src="code/particle.js"></script>
		<script src="code/fireFlower.js"></script>
        <script src="code/bulletBill.js"></script>
        <script src="code/flowerEnemy.js"></script>
        <script src="code/shell.js"></script>

        <script src="code/titleState.js"></script>
        <script src="code/loadingState.js"></script>
        <script src="code/loseState.js"></script>
        <script src="code/winState.js"></script>
        <script src="code/mapState.js"></script>
        <script src="code/levelState.js"></script>

        <script src="code/music.js"></script>
        <script src="code/auth.js"></script>

        <script>
        // Show touch controls only on mobile
        function isMobile() {
            return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
        }
        document.getElementById('touch-controls').style.display = isMobile() ? 'flex' : 'none';

        // Map buttons to key codes
        const keyMap = {
            'btn-left': 37,   // Left arrow
            'btn-up': 38,     // Up arrow
            'btn-right': 39,  // Right arrow
            'btn-down': 40,   // Down arrow
            'btn-a': 83,      // S (Jump)
            'btn-b': 65,      // A (Fire)
            'btn-start': 13,  // Enter
            'btn-select': 16  // Shift
        };
        function triggerKeyEvent(type, keyCode) {
            const event = new KeyboardEvent(type, { keyCode: keyCode, which: keyCode });
            document.dispatchEvent(event);
        }
        Object.keys(keyMap).forEach(id => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                triggerKeyEvent('keydown', keyMap[id]);
            });
            btn.addEventListener('touchend', e => {
                e.preventDefault();
                triggerKeyEvent('keyup', keyMap[id]);
            });
        });
        </script>

        <!-- Game starts ONLY after successful login (see auth.js) -->
	</body>
</html>
